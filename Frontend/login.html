<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Hub - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #f2f1ef;
            --surface: #fff;
            --surface-2: #f7f6f4;
            --border: #e8e6e2;
            --ink: #1c1b19;
            --ink-2: #6b6861;
            --ink-3: #b0ada8;
            --dark: #16151a;
            --r: 14px
        }

        html,
        body {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--ink)
        }

        .wrap {
            min-height: 100vh;
            padding: 20px;
            display: grid;
            place-items: center
        }

        .card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 980px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 46px rgba(0, 0, 0, .14)
        }

        .left {
            background: var(--dark);
            padding: 44px 36px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between
        }

        .left::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255, 255, 255, .03) 1px, transparent 1px);
            background-size: 18px 18px
        }

        .left>* {
            position: relative;
            z-index: 1
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(255, 255, 255, .09);
            margin-bottom: 24px
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 8px
        }

        .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, .45)
        }

        .bars {
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            gap: 9px
        }

        .bar {
            height: 5px;
            border-radius: 99px;
            background: rgba(255, 255, 255, .1)
        }

        .bar:nth-child(1) {
            width: 42%
        }

        .bar:nth-child(2) {
            width: 62%
        }

        .bar:nth-child(3) {
            width: 82%
        }

        .chip {
            margin-top: 22px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 12px;
            color: rgba(255, 255, 255, .62)
        }

        .right {
            padding: 44px 42px;
            background: var(--surface)
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-2);
            margin-bottom: 18px
        }

        .back-home:hover {
            color: var(--ink)
        }

        .right h1 {
            font-size: 30px;
            line-height: 1.1;
            margin-bottom: 8px
        }

        .right p {
            font-size: 14px;
            color: var(--ink-3);
            margin-bottom: 30px
        }



        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-2);
            margin-bottom: 7px
        }

        .field input {
            width: 100%;
            height: 46px;
            border: 1.5px solid var(--border);
            border-radius: 11px;
            background: var(--surface-2);
            padding: 0 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none
        }

        .field input:focus {
            border-color: var(--ink);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(28, 27, 25, .07)
        }

        .field input.input-error {
            border-color: #b84545;
            box-shadow: 0 0 0 4px rgba(184, 69, 69, .12)
        }

        .field-error {
            min-height: 16px;
            margin-top: 6px;
            font-size: 12px;
            color: #b84545
        }

        .row {
            display: flex;
            justify-content: flex-end;
            margin: 0px 0 22px
        }

        .forgot {
            font-size: 12px;
            color: var(--ink-2);
            font-weight: 600;
            cursor: pointer
        }

        .btn {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 11px;
            background: var(--ink);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer
        }

        .btn:hover {
            opacity: .94
        }

        .line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0
        }

        .line::before,
        .line::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border)
        }

        .line span {
            font-size: 12px;
            color: var(--ink-3)
        }

        .btn-google {
            width: 100%;
            height: 44px;
            border: 1px solid var(--border);
            border-radius: 11px;
            background: var(--surface-2);
            font-weight: 600;
            font-size: 13px;
            color: var(--ink);
            cursor: pointer
        }

        .signup {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            color: var(--ink-3)
        }

        .signup b {
            color: var(--ink)
        }

        @media(max-width:900px) {
            .card {
                grid-template-columns: 1fr
            }

            .left {
                padding: 28px 22px
            }

            .right {
                padding: 30px 22px
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <section class="left">
                <div>
                    <div class="avatar"><img src="image/ceclogo.jpg" alt="Cebu Eastern College Logo" /></div>
                    <div class="title">Cebu Eastern College</div>
                    <div class="sub">Attendance Hub - Student Portal</div>
                    <div class="bars">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </div>
                <div class="chip">Secure sign-in active - Campus network verified</div>
            </section>

            <section class="right">
                <a class="back-home" href="index.html">&larr; Back to Home</a>
                <h1>Welcome back</h1>
                <p>Sign in to continue to your attendance dashboard.</p>
                <form id="loginForm" novalidate>
                    <div class="field"><label>Email</label><input id="email" type="email" placeholder="Email"
                            required />
                        <div class="field-error" id="emailError"></div>
                    </div>
                    <div class="field"><label>Password</label><input id="password" type="password"
                            placeholder="********" required />
                        <div class="field-error" id="passwordError"></div>
                    </div>
                    <div class="row"><span class="forgot">Forgot password?</span></div>
                    <button class="btn" id="loginBtn" type="submit">Login</button>
                </form>
                <div class="signup" id="loginMessage"></div>
                <div class="signup">Don't have an account? <a href="register.html"><b>Sign up</b></a></div>
            </section>
        </div>
    </div>

    <script src="app-client.js"></script>
    <script>
        // If user is already logged in, go directly to dashboard.
        var currentUser = AttendanceApi.getCurrentUser();
        if (currentUser && currentUser.userId) {
            window.location.href = 'dashboard.html';
        }

        var loginForm = document.getElementById('loginForm');
        var loginBtn = document.getElementById('loginBtn');
        var loginMessage = document.getElementById('loginMessage');
        var emailInput = document.getElementById('email');
        var passwordInput = document.getElementById('password');
        var emailError = document.getElementById('emailError');
        var passwordError = document.getElementById('passwordError');

        // Clear all error messages and red borders.
        function clearErrors() {
            loginMessage.textContent = '';
            emailError.textContent = '';
            passwordError.textContent = '';
            emailInput.classList.remove('input-error');
            passwordInput.classList.remove('input-error');
        }

        // Show one validation error on an input.
        function showError(input, errorNode, message) {
            input.classList.add('input-error');
            errorNode.textContent = message;
        }

        // Clear email error while typing.
        emailInput.addEventListener('input', function () {
            emailInput.classList.remove('input-error');
            emailError.textContent = '';
        });

        // Clear password error while typing.
        passwordInput.addEventListener('input', function () {
            passwordInput.classList.remove('input-error');
            passwordError.textContent = '';
        });

        // Handle login form submit.
        loginForm.addEventListener('submit', async function (event) {
            event.preventDefault();
            clearErrors();

            var emailValue = emailInput.value.trim();
            var passwordValue = passwordInput.value;

            if (!emailValue) {
                showError(emailInput, emailError, 'Email is required.');
                return;
            }

            if (!emailInput.validity.valid) {
                showError(emailInput, emailError, 'Please enter a valid email address.');
                return;
            }

            if (!passwordValue) {
                showError(passwordInput, passwordError, 'Password is required.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                var payload = {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                };

                var user = await AttendanceApi.request('/api/login', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                AttendanceApi.setCurrentUser(user);
                window.location.href = 'dashboard.html';
            } catch (error) {
                var loweredMessage = (error.message || '').toLowerCase();
                if (loweredMessage.includes('invalid email or password')) {
                    showError(passwordInput, passwordError, error.message);
                } else if (loweredMessage.includes('email') && !loweredMessage.includes('password')) {
                    showError(emailInput, emailError, error.message);
                } else if (loweredMessage.includes('password') || loweredMessage.includes('invalid')) {
                    showError(passwordInput, passwordError, error.message);
                } else {
                    loginMessage.textContent = error.message;
                }
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>

</html>
