<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Hub - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #f2f1ef;
            --surface: #fff;
            --surface-2: #f7f6f4;
            --border: #e8e6e2;
            --ink: #1c1b19;
            --ink-2: #6b6861;
            --ink-3: #b0ada8;
            --dark: #16151a;
            --r: 14px
        }

        html,
        body {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--ink)
        }

        a {
            color: inherit;
            text-decoration: none
        }

        .wrap {
            min-height: 100vh;
            padding: 20px;
            display: grid;
            place-items: center
        }

        .card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1040px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 46px rgba(0, 0, 0, .14)
        }

        .left {
            background: var(--dark);
            padding: 44px 36px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between
        }

        .left::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255, 255, 255, .03) 1px, transparent 1px);
            background-size: 18px 18px
        }

        .left>* {
            position: relative;
            z-index: 1
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(255, 255, 255, .09);
            margin-bottom: 24px
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 8px
        }

        .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, .45)
        }

        .bars {
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            gap: 9px
        }

        .bar {
            height: 5px;
            border-radius: 99px;
            background: rgba(255, 255, 255, .1)
        }

        .bar:nth-child(1) {
            width: 42%
        }

        .bar:nth-child(2) {
            width: 62%
        }

        .bar:nth-child(3) {
            width: 82%
        }

        .chip {
            margin-top: 22px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 12px;
            color: rgba(255, 255, 255, .62)
        }

        .right {
            padding: 38px 40px;
            background: var(--surface)
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-2);
            margin-bottom: 16px
        }

        .back-home:hover {
            color: var(--ink)
        }

        .right h1 {
            font-size: 30px;
            line-height: 1.1;
            margin-bottom: 8px
        }

        .right p {
            font-size: 14px;
            color: var(--ink-3);
            margin-bottom: 22px
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .field {
            margin-bottom: 8px
        }

        .field.full {
            grid-column: 1 / -1
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-2);
            margin-bottom: 7px
        }

        .field input,
        .field select {
            width: 100%;
            height: 46px;
            border: 1.5px solid var(--border);
            border-radius: 11px;
            background: var(--surface-2);
            padding: 0 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--ink);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(28, 27, 25, .07)
        }

        .field input.input-error,
        .field select.input-error {
            border-color: #b84545;
            box-shadow: 0 0 0 4px rgba(184, 69, 69, .12)
        }

        .field-error {
            min-height: 16px;
            margin-top: 6px;
            font-size: 12px;
            color: #b84545
        }

        .btn {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 11px;
            background: var(--ink);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px
        }

        .btn:hover {
            opacity: .94
        }

        .signin {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: var(--ink-3)
        }

        .signin a {
            color: var(--ink);
            font-weight: 700
        }

        @media(max-width:980px) {
            .card {
                grid-template-columns: 1fr
            }

            .left {
                padding: 28px 22px
            }

            .right {
                padding: 30px 22px
            }

            .grid {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <section class="left">
                <div>
                    <div class="avatar"><img src="image/ceclogo.jpg" alt="Cebu Eastern College Logo" /></div>
                    <div class="title">Create your student account</div>
                    <div class="sub">Attendance Hub - Cebu Eastern College</div>
                    <div class="bars">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </div>
                <div class="chip">Use your official student details for faster account approval.</div>
            </section>

            <section class="right">
                <a class="back-home" href="index.html">&larr; Back to Home</a>
                <h1>Register</h1>
                <p>Set up your account to access attendance tracking and class records.</p>

                <form id="registerForm" novalidate>
                    <div class="grid">
                        <div class="field full">
                            <label>Full Name</label>
                            <input id="fullName" type="text" placeholder="Enter your full name" required />
                            <div class="field-error" id="fullNameError"></div>
                        </div>
                        <div class="field">
                            <label>Student ID</label>
                            <input id="studentId" type="text" placeholder="2026-00045" required />
                            <div class="field-error" id="studentIdError"></div>
                        </div>
                        <div class="field">
                            <label>Year Level</label>
                            <select id="yearLevel" required>
                                <option value="" selected disabled>Select year level</option>
                                <option>Year 1</option>
                                <option>Year 2</option>
                                <option>Year 3</option>
                                <option>Year 4</option>
                            </select>
                            <div class="field-error" id="yearLevelError"></div>
                        </div>
                        <div class="field full">
                            <label>Course</label>
                            <select id="course" required>
                                <option value="" selected disabled>Select course</option>
                                <option>BS Information Technology</option>
                                <option>BS Computer Science</option>
                            </select>
                            <div class="field-error" id="courseError"></div>
                        </div>
                        <div class="field full">
                            <label>Email</label>
                            <input id="email" type="email" placeholder="name@school.edu" required />
                            <div class="field-error" id="emailError"></div>
                        </div>
                        <div class="field full">
                            <label>Password</label>
                            <input id="password" type="password" placeholder="Create password" required />
                            <div class="field-error" id="passwordError"></div>
                        </div>
                        <div class="field full">
                            <label>Confirm Password</label>
                            <input id="confirmPassword" type="password" placeholder="Confirm password" required />
                            <div class="field-error" id="confirmPasswordError"></div>
                        </div>
                    </div>

                    <button class="btn" id="registerBtn" type="submit">Create Account</button>
                </form>
                <div class="signin" id="registerMessage"></div>

                <div class="signin">Already have an account? <a href="login.html">Login</a></div>
            </section>
        </div>
    </div>

    <script src="app-client.js"></script>
    <script>
        var registerForm = document.getElementById('registerForm');
        var registerBtn = document.getElementById('registerBtn');
        var registerMessage = document.getElementById('registerMessage');
        var formFields = {
            fullName: document.getElementById('fullName'),
            studentId: document.getElementById('studentId'),
            yearLevel: document.getElementById('yearLevel'),
            course: document.getElementById('course'),
            email: document.getElementById('email'),
            password: document.getElementById('password'),
            confirmPassword: document.getElementById('confirmPassword')
        };
        var fieldErrors = {
            fullName: document.getElementById('fullNameError'),
            studentId: document.getElementById('studentIdError'),
            yearLevel: document.getElementById('yearLevelError'),
            course: document.getElementById('courseError'),
            email: document.getElementById('emailError'),
            password: document.getElementById('passwordError'),
            confirmPassword: document.getElementById('confirmPasswordError')
        };

        function clearFieldErrors() {
            registerMessage.textContent = '';
            Object.keys(formFields).forEach(function (key) {
                formFields[key].classList.remove('input-error');
                fieldErrors[key].textContent = '';
            });
        }

        function setFieldError(fieldKey, message) {
            formFields[fieldKey].classList.add('input-error');
            fieldErrors[fieldKey].textContent = message;
        }

        Object.keys(formFields).forEach(function (key) {
            formFields[key].addEventListener('input', function () {
                formFields[key].classList.remove('input-error');
                fieldErrors[key].textContent = '';
            });

            formFields[key].addEventListener('change', function () {
                formFields[key].classList.remove('input-error');
                fieldErrors[key].textContent = '';
            });
        });

        registerForm.addEventListener('submit', async function (event) {
            event.preventDefault();
            clearFieldErrors();

            var payload = {
                fullName: formFields.fullName.value.trim(),
                studentId: formFields.studentId.value.trim(),
                yearLevel: formFields.yearLevel.value,
                course: formFields.course.value,
                email: formFields.email.value.trim(),
                password: formFields.password.value,
                confirmPassword: formFields.confirmPassword.value
            };

            var hasError = false;

            if (!payload.fullName) {
                setFieldError('fullName', 'Full name is required.');
                hasError = true;
            }
            if (!payload.studentId) {
                setFieldError('studentId', 'Student ID is required.');
                hasError = true;
            }
            if (!payload.yearLevel) {
                setFieldError('yearLevel', 'Please select your year level.');
                hasError = true;
            }
            if (!payload.course) {
                setFieldError('course', 'Please select your course.');
                hasError = true;
            }
            if (!payload.email) {
                setFieldError('email', 'Email is required.');
                hasError = true;
            } else if (!formFields.email.validity.valid) {
                setFieldError('email', 'Please enter a valid email address.');
                hasError = true;
            }
            if (!payload.password) {
                setFieldError('password', 'Password is required.');
                hasError = true;
            }
            if (!payload.confirmPassword) {
                setFieldError('confirmPassword', 'Please confirm your password.');
                hasError = true;
            } else if (payload.password && payload.password !== payload.confirmPassword) {
                setFieldError('confirmPassword', 'Password and confirm password do not match.');
                hasError = true;
            }

            if (hasError) {
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating account...';

            try {
                await AttendanceApi.request('/api/auth/register', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                AttendanceApi.clearCurrentUser();
                window.location.href = 'login.html';
            } catch (error) {
                var loweredMessage = (error.message || '').toLowerCase();
                if (loweredMessage.includes('student id')) {
                    setFieldError('studentId', error.message);
                } else if (loweredMessage.includes('email')) {
                    setFieldError('email', error.message);
                } else if (loweredMessage.includes('confirm password') || loweredMessage.includes('password and confirm')) {
                    setFieldError('confirmPassword', error.message);
                } else if (loweredMessage.includes('password')) {
                    setFieldError('password', error.message);
                } else {
                    registerMessage.textContent = error.message;
                }
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>

</html>
