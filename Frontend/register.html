<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Hub - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #f2f1ef;
            --surface: #fff;
            --surface-2: #f7f6f4;
            --border: #e8e6e2;
            --ink: #1c1b19;
            --ink-2: #6b6861;
            --ink-3: #b0ada8;
            --dark: #16151a;
            --r: 14px
        }

        html,
        body {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--ink)
        }

        a {
            color: inherit;
            text-decoration: none
        }

        .wrap {
            min-height: 100vh;
            padding: 20px;
            display: grid;
            place-items: center
        }

        .card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1040px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 46px rgba(0, 0, 0, .14)
        }

        .left {
            background: var(--dark);
            padding: 44px 36px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between
        }

        .left::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255, 255, 255, .03) 1px, transparent 1px);
            background-size: 18px 18px
        }

        .left>* {
            position: relative;
            z-index: 1
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(255, 255, 255, .09);
            margin-bottom: 24px
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 8px
        }

        .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, .45)
        }

        .bars {
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            gap: 9px
        }

        .bar {
            height: 5px;
            border-radius: 99px;
            background: rgba(255, 255, 255, .1)
        }

        .bar:nth-child(1) {
            width: 42%
        }

        .bar:nth-child(2) {
            width: 62%
        }

        .bar:nth-child(3) {
            width: 82%
        }

        .chip {
            margin-top: 22px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 12px;
            color: rgba(255, 255, 255, .62)
        }

        .right {
            padding: 38px 40px;
            background: var(--surface)
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-2);
            margin-bottom: 16px
        }

        .back-home:hover {
            color: var(--ink)
        }

        .right h1 {
            font-size: 30px;
            line-height: 1.1;
            margin-bottom: 8px
        }

        .right p {
            font-size: 14px;
            color: var(--ink-3);
            margin-bottom: 22px
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .field {
            margin-bottom: 8px
        }

        .field.full {
            grid-column: 1 / -1
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-2);
            margin-bottom: 7px
        }

        .field input,
        .field select {
            width: 100%;
            height: 46px;
            border: 1.5px solid var(--border);
            border-radius: 11px;
            background: var(--surface-2);
            padding: 0 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--ink);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(28, 27, 25, .07)
        }

        .field input.input-error,
        .field select.input-error {
            border-color: #b84545;
            box-shadow: 0 0 0 4px rgba(184, 69, 69, .12)
        }

        .field-error {
            min-height: 16px;
            margin-top: 6px;
            font-size: 12px;
            color: #b84545
        }

        .btn {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 11px;
            background: var(--ink);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px
        }

        .btn:hover {
            opacity: .94
        }

        .signin {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: var(--ink-3)
        }

        .signin a {
            color: var(--ink);
            font-weight: 700
        }

        @media(max-width:980px) {
            .card {
                grid-template-columns: 1fr
            }

            .left {
                padding: 28px 22px
            }

            .right {
                padding: 30px 22px
            }

            .grid {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <section class="left">
                <div>
                    <div class="avatar"><img src="image/ceclogo.jpg" alt="Cebu Eastern College Logo" /></div>
                    <div class="title">Create your student account</div>
                    <div class="sub">Attendance Hub - Cebu Eastern College</div>
                    <div class="bars">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </div>
                <div class="chip">Use your official student details for faster account approval.</div>
            </section>

            <section class="right">
                <a class="back-home" href="index.html">&larr; Back to Home</a>
                <h1>Register</h1>
                <p>Set up your account to access attendance tracking and class records.</p>

                <form id="registerForm" novalidate>
                    <div class="grid">
                        <div class="field full">
                            <label>Full Name</label>
                            <input id="fullName" type="text" placeholder="Enter your full name" required />
                            <div class="field-error" id="fullNameError"></div>
                        </div>
                        <div class="field">
                            <label>Student ID</label>
                            <input id="studentId" type="text" placeholder="2026-00045" required />
                            <div class="field-error" id="studentIdError"></div>
                        </div>
                        <div class="field">
                            <label>Year Level</label>
                            <select id="yearLevel" required>
                                <option value="" selected disabled>Select year level</option>
                                <option>Year 1</option>
                                <option>Year 2</option>
                                <option>Year 3</option>
                                <option>Year 4</option>
                            </select>
                            <div class="field-error" id="yearLevelError"></div>
                        </div>
                        <div class="field full">
                            <label>Course</label>
                            <select id="course" required>
                                <option value="" selected disabled>Select course</option>
                                <option>BS Information Technology</option>
                                <option>BS Computer Science</option>
                            </select>
                            <div class="field-error" id="courseError"></div>
                        </div>
                        <div class="field full">
                            <label>Email</label>
                            <input id="email" type="email" placeholder="name@school.edu" required />
                            <div class="field-error" id="emailError"></div>
                        </div>
                        <div class="field full">
                            <label>Password</label>
                            <input id="password" type="password" placeholder="Create password" required />
                            <div class="field-error" id="passwordError"></div>
                        </div>
                        <div class="field full">
                            <label>Confirm Password</label>
                            <input id="confirmPassword" type="password" placeholder="Confirm password" required />
                            <div class="field-error" id="confirmPasswordError"></div>
                        </div>
                    </div>

                    <button class="btn" id="registerBtn" type="submit">Create Account</button>
                </form>
                <div class="signin" id="registerMessage"></div>

                <div class="signin">Already have an account? <a href="login.html">Login</a></div>
            </section>
        </div>
    </div>

    <script src="app-client.js"></script>
    <script>
        var registerForm = document.getElementById('registerForm');
        var registerBtn = document.getElementById('registerBtn');
        var registerMessage = document.getElementById('registerMessage');
        var fullNameInput = document.getElementById('fullName');
        var studentIdInput = document.getElementById('studentId');
        var yearLevelInput = document.getElementById('yearLevel');
        var courseInput = document.getElementById('course');
        var emailInput = document.getElementById('email');
        var passwordInput = document.getElementById('password');
        var confirmPasswordInput = document.getElementById('confirmPassword');

        var fullNameError = document.getElementById('fullNameError');
        var studentIdError = document.getElementById('studentIdError');
        var yearLevelError = document.getElementById('yearLevelError');
        var courseError = document.getElementById('courseError');
        var emailError = document.getElementById('emailError');
        var passwordError = document.getElementById('passwordError');
        var confirmPasswordError = document.getElementById('confirmPasswordError');

        // Clear all validation messages and red borders.
        function clearErrors() {
            registerMessage.textContent = '';

            fullNameInput.classList.remove('input-error');
            studentIdInput.classList.remove('input-error');
            yearLevelInput.classList.remove('input-error');
            courseInput.classList.remove('input-error');
            emailInput.classList.remove('input-error');
            passwordInput.classList.remove('input-error');
            confirmPasswordInput.classList.remove('input-error');

            fullNameError.textContent = '';
            studentIdError.textContent = '';
            yearLevelError.textContent = '';
            courseError.textContent = '';
            emailError.textContent = '';
            passwordError.textContent = '';
            confirmPasswordError.textContent = '';
        }

        // Show one validation error on an input.
        function showError(input, errorNode, message) {
            input.classList.add('input-error');
            errorNode.textContent = message;
        }

        // Clear one field error when user updates that field.
        function clearSingleField(input, errorNode) {
            input.classList.remove('input-error');
            errorNode.textContent = '';
        }

        // Remove errors as user types or changes values.
        fullNameInput.addEventListener('input', function () { clearSingleField(fullNameInput, fullNameError); });
        studentIdInput.addEventListener('input', function () { clearSingleField(studentIdInput, studentIdError); });
        yearLevelInput.addEventListener('change', function () { clearSingleField(yearLevelInput, yearLevelError); });
        courseInput.addEventListener('change', function () { clearSingleField(courseInput, courseError); });
        emailInput.addEventListener('input', function () { clearSingleField(emailInput, emailError); });
        passwordInput.addEventListener('input', function () { clearSingleField(passwordInput, passwordError); });
        confirmPasswordInput.addEventListener('input', function () { clearSingleField(confirmPasswordInput, confirmPasswordError); });

        // Handle register form submit.
        registerForm.addEventListener('submit', async function (event) {
            event.preventDefault();
            clearErrors();

            var payload = {
                fullName: fullNameInput.value.trim(),
                studentId: studentIdInput.value.trim(),
                yearLevel: yearLevelInput.value,
                course: courseInput.value,
                email: emailInput.value.trim(),
                password: passwordInput.value,
                confirmPassword: confirmPasswordInput.value
            };

            if (!payload.fullName) {
                showError(fullNameInput, fullNameError, 'Full name is required.');
                return;
            }

            if (!payload.studentId) {
                showError(studentIdInput, studentIdError, 'Student ID is required.');
                return;
            }

            if (!payload.yearLevel) {
                showError(yearLevelInput, yearLevelError, 'Please select your year level.');
                return;
            }

            if (!payload.course) {
                showError(courseInput, courseError, 'Please select your course.');
                return;
            }

            if (!payload.email) {
                showError(emailInput, emailError, 'Email is required.');
                return;
            }

            if (!emailInput.validity.valid) {
                showError(emailInput, emailError, 'Please enter a valid email address.');
                return;
            }

            if (!payload.password) {
                showError(passwordInput, passwordError, 'Password is required.');
                return;
            }

            if (!payload.confirmPassword) {
                showError(confirmPasswordInput, confirmPasswordError, 'Please confirm your password.');
                return;
            }

            if (payload.password !== payload.confirmPassword) {
                showError(confirmPasswordInput, confirmPasswordError, 'Password and confirm password do not match.');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating account...';

            try {
                await AttendanceApi.request('/api/register', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                AttendanceApi.clearCurrentUser();
                window.location.href = 'login.html';
            } catch (error) {
                var loweredMessage = (error.message || '').toLowerCase();
                if (loweredMessage.includes('student id')) {
                    showError(studentIdInput, studentIdError, error.message);
                } else if (loweredMessage.includes('email')) {
                    showError(emailInput, emailError, error.message);
                } else if (loweredMessage.includes('confirm password') || loweredMessage.includes('password and confirm')) {
                    showError(confirmPasswordInput, confirmPasswordError, error.message);
                } else if (loweredMessage.includes('password')) {
                    showError(passwordInput, passwordError, error.message);
                } else {
                    registerMessage.textContent = error.message;
                }
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>

</html>
