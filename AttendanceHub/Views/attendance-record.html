<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Hub - Attendance Record</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
        <link rel="stylesheet" href="css/attendance-record.css" />
</head>

<body>
    <div class="shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon"><svg viewBox="0 0 18 18">
                        <rect x="1" y="1" width="7" height="7" rx="1.5" />
                        <rect x="10" y="1" width="7" height="7" rx="1.5" />
                        <rect x="1" y="10" width="7" height="7" rx="1.5" />
                        <rect x="10" y="10" width="7" height="7" rx="1.5" />
                    </svg></div>
                <div>
                    <div class="brand-name">Attendance Hub</div>
                    <div class="brand-sub">Student Portal</div>
                </div>
            </div>
            <div class="nav-label">Menu</div>
            <nav>
                <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                    </svg>Dashboard</a>
                <a class="nav-item" href="new-attendance.html"><svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="9" />
                        <line x1="12" y1="8" x2="12" y2="16" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>New Attendance</a>
                <a class="nav-item active" href="attendance-record.html"><svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <line x1="7" y1="8" x2="17" y2="8" />
                        <line x1="7" y1="12" x2="17" y2="12" />
                        <line x1="7" y1="16" x2="13" y2="16" />
                    </svg>Records</a>
            </nav>
            <div class="sp"></div>
            <div class="user-card">
                <div class="avatar"><svg viewBox="0 0 24 24">
                        <circle cx="12" cy="8" r="3.5" />
                        <path d="M5.5 19.5c1.5-3.2 4-4.8 6.5-4.8s5 1.6 6.5 4.8" />
                    </svg></div>
                <div>
                    <div class="user-name" id="sidebarUserName">Student Name</div>
                    <div class="user-role" id="sidebarUserRole">Course — Year</div>
                </div>
            </div>
            <div class="sidebar-actions">
                <a class="s-btn logout" id="logoutBtn" href="login.html"><svg viewBox="0 0 24 24">
                        <path d="M10 7H7a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h3" />
                        <path d="M14 16l4-4-4-4" />
                        <path d="M18 12h-8" />
                    </svg>Log out</a>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div>
                    <div class="greeting-label">History</div>
                    <h1 class="greeting-name">Attendance Record</h1>
                </div>
                <span class="sem-pill">Updated Today</span>
            </header>

            <section class="card">
                <div class="card-title">Filters</div>
                <div class="form-grid">
                    <div><label>Filter by Month</label><select id="monthFilter">
                            <option value="all">All Months</option>
                        </select></div>
                    <div><label>Filter by Subject</label><select id="subjectFilter">
                            <option value="all">All Subjects</option>
                        </select></div>
                </div>
            </section>

            <section class="card">
                <div class="card-title">Log entries</div>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Subject</th>
                            <th>Time In</th>
                            <th>Time Out</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                        <tr>
                            <td colspan="5">Loading records...</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="app-client.js"></script>
    <script>
        var currentUser = AttendanceApi.requireUser('login.html');
        var sidebarUserName = document.getElementById('sidebarUserName');
        var sidebarUserRole = document.getElementById('sidebarUserRole');
        var monthFilter = document.getElementById('monthFilter');
        var subjectFilter = document.getElementById('subjectFilter');
        var recordsBody = document.getElementById('recordsBody');
        var allRecords = [];

        // Show current user details in the sidebar.
        function showCurrentUser() {
            if (!currentUser) {
                return;
            }

            sidebarUserName.textContent = currentUser.fullName;
            sidebarUserRole.textContent = currentUser.course + ' — ' + currentUser.yearLevel;
        }

        // Ask confirmation and log out user.
        async function onLogout(event) {
            event.preventDefault();
            var shouldLogout = await AttendanceApi.confirmLogout();
            if (!shouldLogout) {
                return;
            }

            AttendanceApi.clearCurrentUser();
            window.location.href = 'login.html';
        }

        // Format date text for the table.
        function formatDate(dateText) {
            var date = new Date(dateText + 'T00:00:00');
            if (Number.isNaN(date.getTime())) {
                return dateText;
            }

            return date.toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });
        }

        // Format time text for the table.
        function formatTime(timeText) {
            if (!timeText) {
                return '';
            }

            var date = new Date('1970-01-01T' + timeText + ':00');
            if (Number.isNaN(date.getTime())) {
                return timeText;
            }

            return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        }

        // Get year-month text like 2026-04 from full date.
        function getMonthKey(dateText) {
            if (!dateText) {
                return '';
            }

            return dateText.slice(0, 7);
        }

        // Convert month key to readable label like April 2026.
        function getMonthLabel(monthKey) {
            var date = new Date(monthKey + '-01T00:00:00');
            if (Number.isNaN(date.getTime())) {
                return monthKey;
            }

            return date.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
        }

        // Check if a select already has a specific option value.
        function hasOptionValue(selectElement, value) {
            for (var i = 0; i < selectElement.options.length; i++) {
                if (selectElement.options[i].value === value) {
                    return true;
                }
            }

            return false;
        }

        // Build month and subject filter options from records.
        function refreshFilters(records) {
            var monthSeen = {};
            var subjectSeen = {};
            var months = [];
            var subjects = [];
            var selectedMonth = monthFilter.value;
            var selectedSubject = subjectFilter.value;

            for (var i = 0; i < records.length; i++) {
                var item = records[i];
                var month = getMonthKey(item.date);
                if (month && !monthSeen[month]) {
                    monthSeen[month] = true;
                    months.push(month);
                }

                var subject = item.subjectCode;
                if (subject && !subjectSeen[subject]) {
                    subjectSeen[subject] = true;
                    subjects.push(subject);
                }
            }

            months.sort().reverse();
            subjects.sort();

            var monthOptionsHtml = '<option value="all">All Months</option>';
            for (var m = 0; m < months.length; m++) {
                monthOptionsHtml += '<option value="' + months[m] + '">' + getMonthLabel(months[m]) + '</option>';
            }
            monthFilter.innerHTML = monthOptionsHtml;

            var subjectOptionsHtml = '<option value="all">All Subjects</option>';
            for (var s = 0; s < subjects.length; s++) {
                subjectOptionsHtml += '<option value="' + subjects[s] + '">' + subjects[s] + '</option>';
            }
            subjectFilter.innerHTML = subjectOptionsHtml;

            if (selectedMonth && hasOptionValue(monthFilter, selectedMonth)) {
                monthFilter.value = selectedMonth;
            }

            if (selectedSubject && hasOptionValue(subjectFilter, selectedSubject)) {
                subjectFilter.value = selectedSubject;
            }
        }

        // Show filtered records in the table.
        function renderTable() {
            var monthValue = monthFilter.value;
            var subjectValue = subjectFilter.value;
            var filtered = [];

            for (var i = 0; i < allRecords.length; i++) {
                var item = allRecords[i];
                var monthMatch = monthValue === 'all' || getMonthKey(item.date) === monthValue;
                var subjectMatch = subjectValue === 'all' || item.subjectCode === subjectValue;
                if (monthMatch && subjectMatch) {
                    filtered.push(item);
                }
            }

            if (!filtered.length) {
                recordsBody.innerHTML = '<tr><td colspan="5">No records found for this filter.</td></tr>';
                return;
            }

            var html = '';
            for (var r = 0; r < filtered.length; r++) {
                var record = filtered[r];
                var statusClass = record.status.toLowerCase() === 'late' ? 'late' : 'present';
                html += '<tr>' +
                    '<td>' + formatDate(record.date) + '</td>' +
                    '<td>' + record.subjectCode + '</td>' +
                    '<td>' + formatTime(record.timeIn) + '</td>' +
                    '<td>' + formatTime(record.timeOut) + '</td>' +
                    '<td><span class="status ' + statusClass + '">' + record.status + '</span></td>' +
                    '</tr>';
            }

            recordsBody.innerHTML = html;
        }

        // Load attendance records from the API.
        async function loadRecords() {
            if (!currentUser) {
                return;
            }

            try {
                allRecords = await AttendanceApi.request('/api/attendance?userId=' + encodeURIComponent(currentUser.userId));
                refreshFilters(allRecords);
                renderTable();
            } catch (error) {
                recordsBody.innerHTML = '<tr><td colspan="5">' + error.message + '</td></tr>';
            }
        }

        // Re-render table when filter changes.
        function onFilterChanged() {
            renderTable();
        }

        document.getElementById('logoutBtn').addEventListener('click', onLogout);
        monthFilter.addEventListener('change', onFilterChanged);
        subjectFilter.addEventListener('change', onFilterChanged);

        showCurrentUser();
        loadRecords();
    </script>
</body>

</html>
